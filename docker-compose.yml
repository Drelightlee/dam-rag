services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: damrag
      POSTGRES_PASSWORD: damrag
      POSTGRES_DB: damrag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U damrag"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://damrag:damrag@db:5432/damrag
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
